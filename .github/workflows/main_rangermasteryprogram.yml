name: Deploy static site to Azure Web App - RangerMasteryProgram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static site package
        shell: bash
        run: |
          mkdir site
          find . -maxdepth 1 -type f \( \
            -name "*.html" -o \
            -name "*.pdf" -o \
            -name "*.png" -o \
            -name "*.jpg" -o \
            -name "*.jpeg" -o \
            -name "*.webp" -o \
            -name "*.txt" -o \
            -name "*.md" \
          \) -exec cp {} site/ \;
          test -f site/index.html

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B9DF9083881C47CA8C4E5A3EA580DCE0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DA3D73B1206C431F9B56DCD1ACB65635 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A1E19CA1DA0444239E0F4B282BFACF7A }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'RangerMasteryProgram'
          slot-name: 'Production'
          package: site
